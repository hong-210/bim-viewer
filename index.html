<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D BIM Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; }
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            pointer-events: none;
            z-index: 10;
        }
        .status { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h3>BIM 3D 뷰어 (Three.js)</h3>
        <p id="info">설정을 로드 중...</p>
        <div id="error-log" class="status"></div>
    </div>
    <div id="container"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. 장면 및 카메라 설정
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeeeeee);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(10, 10, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('container').appendChild(renderer.domElement);

        // 2. 조명 (모델이 어둡게 나오지 않도록)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        // 3. 컨트롤 (마우스 조작)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 4. 로딩 확인용 빨간 박스 (엔진 작동 시 바로 나타남)
        const testBox = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshBasicMaterial({ color: 0xff0000 })
        );
        scene.add(testBox);

        // 5. 모델 로드 (가장 중요한 부분)
        const loader = new GLTFLoader();
        
        // ★ 파일명을 실제 GitHub에 올린 이름과 대소문자까지 똑같이 맞춰주세요.
        const MODEL_FILE = '3dExport3-v1.glb'; 

        loader.load(MODEL_FILE, (gltf) => {
            const model = gltf.scene;

            // BIM 모델의 큰 좌표를 (0,0,0)으로 강제 이동시키는 로직
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            model.position.sub(center); 
            scene.add(model);

            // 카메라 위치 자동 조정 (모델 크기에 맞춰서)
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
            cameraZ *= 1.5; // 약간의 여유 공간
            camera.position.set(cameraZ, cameraZ, cameraZ);
            camera.lookAt(0, 0, 0);
            controls.target.set(0, 0, 0);

            document.getElementById('info').innerText = "로드 성공: " + MODEL_FILE;
            scene.remove(testBox); // 모델 로드 성공 시 빨간 박스 삭제
        }, 
        (xhr) => {
            const progress = (xhr.loaded / xhr.total * 100).toFixed(0);
            document.getElementById('info').innerText = `다운로드 중: ${progress}%`;
        }, 
        (error) => {
            console.error(error);
            document.getElementById('error-log').innerText = "에러: 파일을 찾을 수 없습니다. (파일명/경로 확인)";
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
