<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BIM 3D Viewer - Unit Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: 'Malgun Gothic', sans-serif; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px; border-radius: 12px; width: 280px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); z-index: 100;
        }
        #loader-status {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 25px; border-radius: 30px; font-size: 14px;
        }
        .label { font-weight: bold; color: #0078d4; }
    </style>
</head>
<body>
    <div id="ui-panel">
        <h3>BIM 부재 정보</h3>
        <div id="prop-display">부재를 클릭하세요.</div>
    </div>
    <div id="loader-status">시스템 초기화 중...</div>
    <div id="container"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. 기본 씬 설정
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeeeeee);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(50, 50, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('container').appendChild(renderer.domElement);

        // 2. 조명 및 가이드
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(100, 100, 100);
        scene.add(dirLight);

        scene.add(new THREE.GridHelper(200, 50)); // 바닥 격자
        scene.add(new THREE.AxesHelper(20));      // 좌표축

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 3. 모델 로드 (단위 교정 로직 포함)
        const loader = new GLTFLoader();
        const MODEL_URL = '3dExport3-v1.glb'; 

        loader.load(
            MODEL_URL, 
            function (gltf) {
                const model = gltf.scene;

                // [BIM 매니저 핵심 팁] mm 단위를 m 단위로 강제 변환 (1/1000 축소)
                model.scale.setScalar(0.001); 
                
                // 모든 부재의 안팎이 다 보이도록 설정
                model.traverse(n => { if(n.isMesh) n.material.side = THREE.DoubleSide; });

                scene.add(model);

                // 축소된 모델 기준으로 크기 측정 및 중앙 정렬
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());

                model.position.sub(center); // 원점으로 이동

                // 모델 크기에 맞춰 카메라 거리 자동 조정
                const maxDim = Math.max(size.x, size.y, size.z);
                const cameraDistance = maxDim * 1.8; 
                
                camera.position.set(cameraDistance, cameraDistance, cameraDistance);
                camera.lookAt(0, 0, 0);
                controls.target.set(0, 0, 0);
                controls.update();

                document.getElementById('loader-status').style.display = 'none';
                console.log("로드 성공! 모델 크기(m):", maxDim.toFixed(2));
            },
            function (xhr) {
                const p = (xhr.loaded / xhr.total * 100).toFixed(0);
                document.getElementById('loader-status').innerText = `모델 다운로드 중: ${p}%`;
            },
            function (error) {
                console.error("로드 실패:", error);
                document.getElementById('loader-status').innerText = "파일 로드 실패";
            }
        );

        // 4. 클릭 이벤트 (Raycaster)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                const obj = intersects[0].object;
                const name = obj.name || "Unknown Object";
                
                // 정보 표시 (이름 파싱)
                const parts = name.split('_');
                let displayHTML = `<p><span class="label">ID:</span> ${name}</p>`;
                if(parts.length > 2) {
                    displayHTML += `<p><span class="label">Category:</span> ${parts[1]}</p>`;
                    displayHTML += `<p><span class="label">Type:</span> ${parts[2]}</p>`;
                    displayHTML += `<p><span class="label">Spec:</span> ${parts[3] || '-'}</p>`;
                }
                document.getElementById('prop-display').innerHTML = displayHTML;

                // 클릭 효과 (색상 강조)
                if(obj.material.emissive) {
                    obj.material.emissive.setHex(0x333300);
                    setTimeout(() => obj.material.emissive.setHex(0x000000), 500);
                }
            }
        });

        // 5. 애니메이션 루프
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 창 크기 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
