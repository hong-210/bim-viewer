<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BIM Creative Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #info-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px; border-radius: 10px; width: 250px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            display: none; /* 클릭 전에는 숨김 */
        }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="info-panel">
        <h3 id="prop-name">부재 정보</h3>
        <p id="prop-detail">부재를 클릭하세요.</p>
        <a id="prop-link" href="#" target="_blank" style="display:none;">📄 지침서 보기</a>
    </div>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. 기본 설정 (Scene, Camera, Renderer)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. 조명 (건물이 잘 보이게)
        const light = new THREE.AmbientLight(0xffffff, 1);
        scene.add(light);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(10, 10, 10);
        scene.add(directionalLight);

        // 3. 컨트롤 (마우스 회전/확대)
        const controls = new OrbitControls(camera, renderer.domElement);

        // 4. 모델 로드 부분에 아래 내용을 추가/수정하세요
        const loader = new GLTFLoader();

        // --- 진단용 빨간 상자 추가 (모델이 안 보여도 무대 확인용) ---
        const testBox = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshBasicMaterial({ color: 0xff0000 })
        );
        testBox.position.set(0, 0, 0);
        scene.add(testBox); 
        console.log("진단용 빨간 상자가 무대에 배치되었습니다.");

        // 5. 실제 모델 로드
        loader.load('S_Foundation_MPF3_THK700.glb', (gltf) => {
            const model = gltf.scene;
            scene.add(model);
    
            // [BIM 매니저 팁] 레빗 모델이 너무 멀리 있을 때 원점으로 강제 소환
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center); // 모델을 (0,0,0)으로 이동
    
            console.log('BIM 모델 로드 성공 및 중앙 정렬 완료');
        }, (xhr) => {
            console.log((xhr.loaded / xhr.total * 100) + '% 로드 중...');
        }, (error) => {
            console.error('모델 로드 실패! 경로를 확인하세요:', error);
        });

        // 5. 클릭 이벤트 (Raycaster - 핵심 기능!)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                const selected = intersects[0].object;
                console.log("선택된 부재:", selected.name);
                
                // 정보창 표시
                const panel = document.getElementById('info-panel');
                panel.style.display = 'block';
                document.getElementById('prop-name').innerText = selected.name;
                
                // 이름 분석 (앞서 논의한 파싱 로직 적용)
                const parts = selected.name.split('_');
                document.getElementById('prop-detail').innerText = `카테고리: ${parts[1] || 'Unknown'}\n규격: ${parts[3] || 'N/A'}`;
                
                // 특정 부재 색상 변경 효과 (선택 강조)
                selected.material.emissive = new THREE.Color(0x333300);
            }
        });

        // 애니메이션 루프
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 창 크기 조절 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
